<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Employés — e-Hôtels</title>
    <style>
      :root {
        --blue: #0d7bc4;
        --blue-soft: rgba(13, 123, 196, 0.14);
        --ink: #1a1a1a;
        --muted: #6b6b6b;
        --line: #e8eaed;
        --paper: #f6f7f9;
        --card: #fff;
        --sans: "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif;
        --serif: Georgia, "Times New Roman", ui-serif, serif;
        --sidebar: 268px;
        --max: 1100px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
      }
      .layout {
        display: grid;
        grid-template-columns: var(--sidebar) 1fr;
        min-height: 100vh;
      }
      aside {
        background: var(--card);
        border-right: 1px solid var(--line);
        padding: 1.5rem 1.1rem;
        display: flex;
        flex-direction: column;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow: auto;
      }
      .logo-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 2rem;
        text-decoration: none;
        color: var(--ink);
      }
      .logo-diamond {
        width: 10px;
        height: 10px;
        background: var(--blue);
        transform: rotate(45deg);
      }
      .logo-text {
        font-weight: 700;
        font-size: 0.78rem;
        letter-spacing: 0.14em;
        color: var(--blue);
      }
      .nav-label {
        font-size: 0.62rem;
        letter-spacing: 0.2em;
        color: var(--muted);
        margin-bottom: 0.65rem;
        font-weight: 600;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        padding: 0.65rem 0.75rem;
        border-radius: 8px;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.78rem;
        font-weight: 600;
        margin-bottom: 0.2rem;
      }
      .nav-item:hover {
        background: var(--paper);
        color: var(--ink);
      }
      .nav-item.active {
        background: var(--blue-soft);
        color: var(--blue);
      }
      .sidebar-hotel {
        margin-top: auto;
        padding-top: 1.25rem;
        border-top: 1px solid var(--line);
        font-size: 0.62rem;
        letter-spacing: 0.14em;
        color: var(--muted);
      }
      .sidebar-hotel strong {
        display: block;
        margin-top: 0.35rem;
        font-size: 0.75rem;
        color: var(--ink);
        line-height: 1.35;
      }
      .main-col {
        min-width: 0;
      }
      .top-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.85rem 1.5rem;
        background: var(--card);
        border-bottom: 1px solid var(--line);
      }
      .brand {
        font-weight: 700;
        font-size: 0.85rem;
        letter-spacing: 0.12em;
        color: var(--blue);
      }
      .user-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .user-name {
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .logout {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 999px;
        padding: 0.35rem 0.85rem;
        font-size: 0.66rem;
        cursor: pointer;
        font-family: inherit;
      }
      main {
        max-width: var(--max);
        margin: 0 auto;
        padding: 1.5rem 1.5rem 2.5rem;
      }
      h1 {
        margin: 0;
        font-family: var(--serif);
        font-size: 1.85rem;
        font-weight: 500;
      }
      .sub {
        color: var(--muted);
        margin: 0.5rem 0 1.25rem;
        font-size: 0.9rem;
      }
      .head-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
      }
      .btn-primary {
        background: var(--blue);
        color: #fff;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        cursor: pointer;
        font-family: inherit;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
      }
      th {
        text-align: left;
        padding: 0.85rem 1rem;
        font-size: 0.62rem;
        letter-spacing: 0.12em;
        font-weight: 700;
        color: var(--muted);
        border-bottom: 1px solid var(--line);
        background: #fafbfc;
      }
      td {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--line);
      }
      tr:last-child td {
        border-bottom: none;
      }
      .msg {
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        display: none;
      }
      .msg.show {
        display: block;
      }
      .msg.err {
        background: #fff5f5;
        border: 1px solid #f0c4c4;
        color: #8b2e2e;
      }
      .msg.ok {
        background: #f0faf4;
        border: 1px solid #c4e6d0;
        color: #1e5c2e;
      }
      .modal-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 100;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .modal-backdrop.open {
        display: flex;
      }
      .modal {
        background: var(--card);
        border-radius: 12px;
        max-width: 440px;
        width: 100%;
        max-height: 90vh;
        overflow: auto;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.15);
      }
      .modal-head {
        padding: 1rem 1.2rem;
        border-bottom: 1px solid var(--line);
        font-weight: 700;
        font-size: 1rem;
      }
      .modal-body {
        padding: 1.2rem;
      }
      .modal-body label {
        display: block;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--muted);
        margin-bottom: 0.35rem;
        margin-top: 0.75rem;
      }
      .modal-body label:first-of-type {
        margin-top: 0;
      }
      .modal-body input,
      .modal-body select {
        width: 100%;
        padding: 0.55rem 0.75rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.9rem;
      }
      .modal-foot {
        padding: 0.9rem 1.2rem;
        border-top: 1px solid var(--line);
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
      }
      .btn-ghost {
        border: 1px solid var(--line);
        background: var(--card);
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-size: 0.68rem;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }
      .topbar {
        display: none;
      }
      .toggle {
        display: none;
      }
      @media (max-width: 940px) {
        .layout {
          grid-template-columns: 1fr;
        }
        aside {
          position: fixed;
          left: 0;
          top: 0;
          width: min(300px, 88vw);
          transform: translateX(-105%);
          transition: transform 0.25s ease;
          z-index: 40;
          height: 100vh;
        }
        body.nav-open aside {
          transform: translateX(0);
        }
        .topbar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0.75rem 1rem;
          background: var(--card);
          border-bottom: 1px solid var(--line);
        }
        .toggle {
          display: inline-flex;
          width: 2.75rem;
          height: 2.5rem;
          border: 1px solid var(--line);
          border-radius: 8px;
          background: #fff;
          cursor: pointer;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside>
        <a class="logo-row" href="/manager-dashboard.html">
          <span class="logo-diamond"></span>
          <span class="logo-text">E-HÔTELS</span>
        </a>
        <div class="nav-label">MENU</div>
        <nav>
          <a class="nav-item" href="/manager-dashboard.html">Tableau de bord</a>
          <a class="nav-item active" href="/admin-employes.html">Employés</a>
          <a class="nav-item" href="/admin-chambres.html">Chambres</a>
          <a class="nav-item" href="/admin-clients.html">Clients</a>
        </nav>
        <div class="sidebar-hotel">
          HÔTEL ACTUEL
          <strong id="sidebarHotel">—</strong>
        </div>
      </aside>
      <div class="main-col">
        <div class="topbar">
          <button class="toggle" type="button" id="btnMenu">☰</button>
          <span class="brand">E-HÔTELS</span>
          <span style="width: 2.75rem"></span>
        </div>
        <header class="top-header">
          <span class="brand">E-HÔTELS</span>
          <div class="user-row">
            <span class="user-name" id="headerUser">—</span>
            <button type="button" class="logout" id="btnLogout">Déconnexion</button>
          </div>
        </header>
        <main>
          <div class="msg" id="msg"></div>
          <div class="head-row">
            <div>
              <h1>Employés</h1>
              <p class="sub">Liste des collaborateurs rattachés à votre établissement (données en direct).</p>
            </div>
            <button type="button" class="btn-primary" id="btnNewEmploye">Nouvel employé</button>
          </div>
          <div class="panel">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>NOM</th>
                  <th>EMAIL</th>
                  <th>RÔLE</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </main>
      </div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal">
        <div class="modal-head" id="modalTitle">Nouvel employé</div>
        <form id="formEmploye" class="modal-body">
          <label for="f_nom">Nom complet</label>
          <input id="f_nom" name="nom" required autocomplete="name" />
          <label for="f_adresse">Adresse</label>
          <input id="f_adresse" name="adresse" required autocomplete="street-address" />
          <label for="f_nas">NAS</label>
          <input id="f_nas" name="nas" required inputmode="numeric" autocomplete="off" />
          <label for="f_role">Rôle</label>
          <select id="f_role" name="role" required>
            <option value="employe">employé</option>
            <option value="gestionnaire">gestionnaire</option>
            <option value="manager">manager</option>
          </select>
          <label for="f_email">Email (connexion)</label>
          <input id="f_email" name="email" type="email" required autocomplete="email" />
          <label for="f_mdp">Mot de passe initial</label>
          <input id="f_mdp" name="mot_de_passe" type="password" required autocomplete="new-password" minlength="4" />
        </form>
        <div class="modal-foot">
          <button type="button" class="btn-ghost" id="modalCancel">Annuler</button>
          <button type="submit" form="formEmploye" class="btn-primary" style="border: none">Enregistrer</button>
        </div>
      </div>
    </div>

    <script>
      const LS_ID = "ehotels.userId";
      const LS_ROLE = "ehotels.role";
      const LS_HOTEL = "ehotels.hotelId";
      const LS_NAME = "ehotels.nom";

      function normalizeRole(r) {
        return String(r || "").trim().toLowerCase();
      }

      function pick(r, keys) {
        for (const k of keys) {
          if (r && r[k] != null && String(r[k]).trim() !== "") return r[k];
        }
        return "—";
      }

      function gate() {
        const role = normalizeRole(localStorage.getItem(LS_ROLE));
        if (role !== "gestionnaire" && role !== "manager") {
          window.location.href =
            role === "client" ? "/client-recherche.html" : "/employe-reservations.html";
          return null;
        }
        const hotelId = localStorage.getItem(LS_HOTEL);
        if (!localStorage.getItem(LS_ID)) {
          window.location.href = "/login.html";
          return null;
        }
        return { hotelId };
      }

      function setMsg(kind, text) {
        const el = document.getElementById("msg");
        el.className = "msg show" + (kind === "err" ? " err" : kind === "ok" ? " ok" : "");
        el.textContent = text || "";
        if (!text) {
          el.className = "msg";
          el.classList.remove("show");
        }
      }

      async function load() {
        const s = gate();
        if (!s || !s.hotelId) {
          setMsg("err", "Hôtel manquant en session.");
          return;
        }
        document.getElementById("headerUser").textContent = (
          localStorage.getItem(LS_NAME) || "Gestionnaire"
        ).toUpperCase();
        document.getElementById("sidebarHotel").textContent = "Réf. #" + s.hotelId;

        try {
          const res = await fetch("/employes/" + encodeURIComponent(s.hotelId));
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || data.message);
          const tbody = document.getElementById("tbody");
          tbody.innerHTML = "";
          (Array.isArray(data) ? data : []).forEach((row) => {
            const tr = document.createElement("tr");
            tr.innerHTML =
              "<td>" +
              pick(row, ["id_employe", "ID_EMPLOYE"]) +
              "</td><td></td><td></td><td></td>";
            tr.cells[1].textContent = pick(row, ["nom", "NOM"]);
            tr.cells[2].textContent = pick(row, ["email", "EMAIL"]);
            tr.cells[3].textContent = pick(row, ["role", "ROLE"]);
            tbody.appendChild(tr);
          });
          if (!tbody.children.length) {
            tbody.innerHTML = "<tr><td colspan='4'>Aucun employé pour cet hôtel.</td></tr>";
          }
        } catch (e) {
          setMsg("err", e.message || "Erreur de chargement.");
        }
      }

      function openModal() {
        const s = gate();
        if (!s || !s.hotelId) {
          setMsg("err", "Hôtel manquant en session.");
          return;
        }
        document.getElementById("formEmploye").reset();
        document.getElementById("modalBackdrop").classList.add("open");
      }

      function closeModal() {
        document.getElementById("modalBackdrop").classList.remove("open");
      }

      document.getElementById("btnNewEmploye").addEventListener("click", openModal);
      document.getElementById("modalCancel").addEventListener("click", closeModal);
      document.getElementById("modalBackdrop").addEventListener("click", (e) => {
        if (e.target.id === "modalBackdrop") closeModal();
      });

      document.getElementById("formEmploye").addEventListener("submit", async (e) => {
        e.preventDefault();
        const s = gate();
        if (!s || !s.hotelId) {
          setMsg("err", "Hôtel manquant en session.");
          return;
        }
        const idHotel = parseInt(String(s.hotelId), 10);
        if (!Number.isFinite(idHotel)) {
          setMsg("err", "Identifiant hôtel invalide.");
          return;
        }
        const body = {
          id_hotel: idHotel,
          nom: document.getElementById("f_nom").value.trim(),
          adresse: document.getElementById("f_adresse").value.trim(),
          nas: document.getElementById("f_nas").value.trim(),
          role: document.getElementById("f_role").value.trim(),
          email: document.getElementById("f_email").value.trim(),
          mot_de_passe: document.getElementById("f_mdp").value,
        };
        if (!body.nom || !body.adresse || !body.nas || !body.email || !body.mot_de_passe) {
          setMsg("err", "Veuillez remplir tous les champs.");
          return;
        }
        try {
          const res = await fetch("/employes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          const t = await res.text();
          let d = null;
          try {
            d = t ? JSON.parse(t) : null;
          } catch {
            d = null;
          }
          if (!res.ok) {
            setMsg("err", (d && (d.error || d.message)) || "Création impossible.");
            return;
          }
          closeModal();
          setMsg("ok", "Employé créé : " + body.nom + " peut se connecter avec cet email.");
          await load();
        } catch {
          setMsg("err", "Erreur réseau.");
        }
      });

      document.getElementById("btnLogout").addEventListener("click", () => {
        localStorage.removeItem(LS_ID);
        localStorage.removeItem(LS_ROLE);
        localStorage.removeItem(LS_HOTEL);
        localStorage.removeItem(LS_NAME);
        window.location.href = "/login.html";
      });
      document.getElementById("btnMenu")?.addEventListener("click", () => document.body.classList.toggle("nav-open"));
      load();
    </script>
  </body>
</html>
