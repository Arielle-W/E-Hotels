<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connexion — e-Hôtels</title>
    <style>
      :root {
        --ink: #202020;
        --blue: #1f8ed8;
        --blue-soft: rgba(31, 142, 216, 0.1);
        --line: #e8e8e8;
        --panel: rgba(255, 255, 255, 0.96);
        --shadow: 0 40px 120px rgba(0, 0, 0, 0.32);
        --sans: "Segoe UI", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: var(--sans);
        letter-spacing: 0.008em;
        display: grid;
        place-items: center;
        padding: 1.2rem;
        position: relative;
        overflow: hidden;
      }

      .bg,
      .bg-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      .bg {
        background:
          linear-gradient(120deg, rgba(0, 0, 0, 0.42), rgba(0, 0, 0, 0.24)),
          url("/images/login-bg.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        transform: scale(1.05);
        filter: blur(6px);
      }

      .bg-overlay {
        background: rgba(18, 18, 18, 0.2);
      }

      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 370px;
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.55);
        box-shadow: var(--shadow);
        border-radius: 4px;
        padding: 2rem 2rem 1.35rem;
        backdrop-filter: blur(3px);
      }

      .logo {
        text-align: center;
        margin-bottom: 1.8rem;
      }

      .logo h1 {
        margin: 0 0 0.3rem;
        font-family: "Times New Roman", Georgia, serif;
        font-weight: 500;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        font-size: clamp(1.45rem, 3.8vw, 1.85rem);
        color: #217fad;
      }

      .logo p {
        margin: 0;
        font-size: 0.58rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #9ca3a8;
        font-weight: 300;
      }

      label {
        display: block;
        font-size: 0.62rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin-bottom: 0.35rem;
        color: #7b7b7b;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 0.62rem 0.72rem;
        border: 1px solid var(--line);
        border-radius: 2px;
        font-family: var(--sans);
        font-weight: 300;
        font-size: 0.87rem;
        outline: none;
        background: #fff;
      }

      input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px var(--blue-soft);
      }

      .group {
        margin-bottom: 1rem;
      }

      .btn {
        width: 100%;
        padding: 0.8rem 1rem;
        background: var(--blue);
        color: #fff;
        border: 1px solid #1f8ed8;
        border-radius: 2px;
        cursor: pointer;
        font-family: var(--sans);
        font-size: 0.64rem;
        font-weight: 500;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        transition: filter 0.2s ease;
      }

      .btn:hover {
        filter: brightness(1.07);
      }

      .row-between {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0.7rem 0 1rem;
        gap: 0.7rem;
      }

      .remember {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 0.63rem;
        color: #808080;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .remember input {
        width: auto;
        box-shadow: none;
        accent-color: var(--blue);
      }

      .forgot {
        color: #69a8cb;
        text-decoration: none;
        font-size: 0.66rem;
      }

      .split {
        margin: 1rem 0 0.85rem;
        border-top: 1px solid var(--line);
      }

      .register {
        text-align: center;
        font-size: 0.67rem;
        color: #8b8b8b;
      }

      .register a {
        color: var(--blue);
        text-decoration: none;
      }

      .toast {
        margin-top: 1.25rem;
        padding: 0.7rem 0.8rem;
        border: 1px solid #d9e8f2;
        background: #f4fbff;
        color: #2f5d75;
        display: none;
        font-weight: 300;
        font-size: 0.84rem;
      }

      .toast.ok { border-color: #c8e3f3; }

      .toast.err {
        border-color: #eed6d6;
        background: #fff6f6;
        color: #8b4040;
      }

      .bottom-links {
        position: fixed;
        left: 50%;
        bottom: 1.3rem;
        transform: translateX(-50%);
        z-index: 1;
        display: flex;
        gap: 1.4rem;
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.68rem;
      }

      @media (max-width: 520px) {
        .card { padding: 1.6rem 1.2rem 1.2rem; }
        .bottom-links { font-size: 0.6rem; gap: 0.8rem; }
      }
    </style>
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <div class="bg-overlay" aria-hidden="true"></div>

    <section class="card" aria-label="Connexion">
      <div class="logo">
        <h1>◇ e-Hôtels</h1>
        <p>L'excellence hospitalière</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="group">
          <label for="email">Adresse email</label>
          <input id="email" name="email" type="email" autocomplete="username" required placeholder="votre@prestige.com" />
        </div>
        <div class="group">
          <label for="password">Mot de passe</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>

        <div class="row-between">
          <label class="remember"><input type="checkbox" id="remember" /> Se souvenir de moi</label>
          <a class="forgot" href="#" onclick="return false;">Oublié ?</a>
        </div>

        <button class="btn" type="submit" id="btnLogin">Connecter</button>
        <div class="toast" id="toast" role="status" aria-live="polite"></div>
      </form>

      <div class="split"></div>
      <p class="register">Nouveau membre ? <a href="#" onclick="return false;">Rejoindre le cercle</a></p>
    </section>

    <div class="bottom-links" aria-hidden="true">
      <span>Assistance Privée</span>
      <span>Confidentialité</span>
      <span>Mentions Légales</span>
    </div>

    <script>
      const LS_ID = "ehotels.userId";
      const LS_ROLE = "ehotels.role";
      const LS_HOTEL = "ehotels.hotelId";
      const LS_NAME = "ehotels.nom";

      function showToast(kind, msg) {
        const el = document.getElementById("toast");
        el.className = "toast " + (kind || "");
        el.textContent = msg;
        el.style.display = "block";
      }

      function normalizeRole(role) {
        return String(role || "").trim().toLowerCase();
      }

      function pickUser(payload) {
        if (!payload) return {};
        if (payload.user && typeof payload.user === "object") return payload.user;
        return payload;
      }

      function redirectByRole(role) {
        const r = normalizeRole(role);
        if (r === "client") window.location.href = "/client-recherche.html";
        else if (r === "gestionnaire" || r === "manager") window.location.href = "/manager-dashboard.html";
        else window.location.href = "/employe-reservations.html";
      }

      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnLogin");
        btn.disabled = true;

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          showToast("err", "Veuillez renseigner votre email et votre mot de passe.");
          btn.disabled = false;
          return;
        }

        try {
          const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, mot_de_passe: password, password }),
          });

          const text = await res.text();
          let data = null;
          try {
            data = text ? JSON.parse(text) : null;
          } catch {
            data = null;
          }

          if (!res.ok) {
            const message = (data && (data.error || data.message)) || "Identifiants invalides.";
            showToast("err", message);
            btn.disabled = false;
            return;
          }

          const user = pickUser(data);
          const userId = user.id ?? user.id_client ?? user.ID_CLIENT ?? user.userId;
          const role = user.role ?? user.role_name ?? user.type ?? user.fonction ?? user.Role;
          const hotelId = user.id_hotel ?? user.ID_HOTEL ?? user.hotelId ?? user.hotel_id;
          const nom = user.nom ?? user.name ?? user.NOM ?? user.fullname;

          if (!userId || !role) {
            showToast("err", "Connexion réussie, mais la réponse ne contient pas l’identifiant et le rôle.");
            btn.disabled = false;
            return;
          }

          localStorage.setItem(LS_ID, String(userId));
          localStorage.setItem(LS_ROLE, String(role));
          if (hotelId != null) localStorage.setItem(LS_HOTEL, String(hotelId));
          if (nom) localStorage.setItem(LS_NAME, String(nom));

          showToast("ok", "Bienvenue. Ouverture de votre espace…");
          setTimeout(() => redirectByRole(role), 450);
        } catch (err) {
          showToast("err", "Impossible de contacter le serveur. Vérifiez que le backend tourne sur le port 3000.");
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
